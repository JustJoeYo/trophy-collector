apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: trophy-collector-ingress
  namespace: trophy-collector
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: trophy-collector.local    # Change to your domain in production
      http:
        paths:
          # API traffic → Go backend
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8080
          # Everything else → React frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
